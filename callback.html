<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TikTok Auth — MindMoneyToday</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 80px auto; padding: 0 20px; color: #222; text-align: center; }
    code { display: block; background: #f4f4f4; padding: 16px; font-size: 1.1rem; word-break: break-all; border-radius: 6px; margin: 20px 0; cursor: pointer; }
    p.hint { color: #888; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h2>Authorization successful</h2>
  <p>Copy the code below and paste it into the terminal:</p>
  <code id="code"></code>
  <p class="hint">Click the code to copy it to clipboard.</p>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code") || "No code found in URL.";
    const el = document.getElementById("code");
    el.textContent = code;
    el.addEventListener("click", () => {
      navigator.clipboard.writeText(code);
      el.textContent = "Copied!";
      setTimeout(() => el.textContent = code, 1500);
    });
  </script>
</body>
</html>
